workflows:
  ios-release:
    name: iOS Release to TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 120
    integrations:
      app_store_connect: app_store_connect
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.jpedrero.trazos
      vars:
        BUNDLE_ID: com.jpedrero.trazos
    scripts:
      - name: Disable Flutter Swift Package Manager
        script: |
          flutter config --no-enable-swift-package-manager
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Install CocoaPods dependencies
        script: |
          cd ios
          pod install --repo-update
      - name: Set up iOS code signing
        script: |
          xcode-project use-profiles
      - name: Build iOS IPA
        script: |
          flutter build ipa --release -t lib/main.dart --build-number=$PROJECT_BUILD_NUMBER --export-options-plist=/Users/builder/export_options.plist
      - name: Verify IPA build number
        script: |
          IPA_PATH=$(find build/ios/ipa -name '*.ipa' -type f | head -n 1)
          unzip -q "$IPA_PATH" -d /tmp/trazos_ipa
          BUILD_NUMBER=$(/usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' /tmp/trazos_ipa/Payload/*.app/Info.plist)
          echo "IPA CFBundleVersion: $BUILD_NUMBER"
          if [ "$BUILD_NUMBER" -le 27 ]; then
            echo "CFBundleVersion must be greater than 27"
            exit 1
          fi
    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/archive/*.xcarchive
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
