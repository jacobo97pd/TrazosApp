name: runrace
description: Conquista zonas corriendo. Compite, captura, domina.
publish_to: 'none'

version: 1.0.22+25

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── Firebase ────────────────────────────────────────────────────────────────
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.0
  cloud_firestore: ^5.4.0
  firebase_storage: ^12.3.0
  firebase_messaging: ^15.1.0
  cloud_functions: ^5.1.0
  google_sign_in: ^6.2.1         # login con Google (móvil)

  # ── Mapas y GPS ─────────────────────────────────────────────────────────────
  google_maps_flutter: ^2.9.0   # Android + web
  apple_maps_flutter: ^1.3.0    # iOS (MapKit nativo, sin API key ni billing)
  geolocator: ^13.0.1
  flutter_background_service: ^5.0.5
  permission_handler: ^11.3.1

  # ── Geometría ───────────────────────────────────────────────────────────────
  turf: ^0.0.9                  # turf_dart fork — booleanPointInPolygon, area, intersect

  # ── Estado ──────────────────────────────────────────────────────────────────
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # ── Navegación ──────────────────────────────────────────────────────────────
  go_router: ^14.3.0

  # ── Strava / Deep-link OAuth ─────────────────────────────────────────────────
  url_launcher: ^6.3.1
  app_links: ^6.3.2              # deep-link callback OAuth (reemplaza uni_links)
  flutter_secure_storage: ^9.2.2 # almacén seguro para tokens Strava

  # ── UI/UX ───────────────────────────────────────────────────────────────────
  google_fonts: ^6.2.1
  confetti: ^0.7.0               # animación celebración captura
  lottie: ^3.1.2                 # animaciones splash / onboarding
  cached_network_image: ^3.4.1
  flutter_cache_manager: ^3.4.1  # limpiar caché de imágenes en Ajustes
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0
  image_picker: ^1.1.2          # subir foto de perfil

  # ── Utilidades ──────────────────────────────────────────────────────────────
  intl: ^0.19.0
  package_info_plus: ^8.0.0      # versión de la app en Ajustes
  shared_preferences: ^2.3.2
  uuid: ^4.5.1
  equatable: ^2.0.5
  rxdart: ^0.28.0
  http: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.4
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.3
  custom_lint: ^0.7.5
  riverpod_lint: ^2.6.3

flutter:
  config:
    enable-swift-package-manager: false

  uses-material-design: true

  assets:
    - assets/images/
    - assets/lottie/
    - assets/icons/
    - assets/map_style_dark.json

  # La fuente DMSans se carga vía el paquete `google_fonts` (descarga en runtime),
  # por lo que no se declara aquí. Si en el futuro quieres empaquetarla offline,
  # añade los .ttf en assets/fonts/ y descomenta este bloque:
  # fonts:
  #   - family: DMSans
  #     fonts:
  #       - asset: assets/fonts/DMSans-Regular.ttf
  #       - asset: assets/fonts/DMSans-Medium.ttf
  #         weight: 500
  #       - asset: assets/fonts/DMSans-SemiBold.ttf
  #         weight: 600
  #       - asset: assets/fonts/DMSans-Bold.ttf
  #         weight: 700

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/Trazos-icon.png"
  remove_alpha_ios: true
  min_sdk_android: 21
